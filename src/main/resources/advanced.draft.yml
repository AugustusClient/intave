# Before you change anything here:
#
# In the overwhelming majority of cases, changing stuff here will break things.
# It is recommended not to change anything here unless you know exactly what you are doing.
# When you experience false positives, report them to us, and we will fix them.
# Before changing anything, please check the Intave console output for any warnings or instructions.
# If you have any questions - contact us on discord, thank you!

version: "15.0.0"
state: 0

check:
  # Detects and mitigates movement modifications
  physics:
    # Severely nerfs the physics check
    #   This option should not be necessary, and will allow players to cheat
    #   FALSE POSITIVES -> REPORT THEM
    high-tolerance: false

    # Mitigation mode
    #   Choose between AGGRESSIVE, CAREFUL, LENIENT, BARELY and SILENT
    #   FALSE POSITIVES -> REPORT THEM
    mitigation: CAREFUL

    # Check for NoSlowdown cheats?
    enforce-item-slowdown: true

    on-detection:
      # Can help reduce item-related false positives
      reset-item-usage: true
      # Can help reduce inventory-related false positives
      close-inventory: true
      # Can help reduce ghost-block related false positives
      refresh-nearby-blocks: true

    # Do not kick or ban
    thresholds:
      100: "intave internals sendnotify &c{player}&7/{trust-color}&7 is moving incorrectly"
      400: "intave internals sendnotify &c{player}&7/{trust-color}&7 is moving incorrectly #2"
      500: "intave internals storelog {player} {check} {vl}"
      999:
        - $kick$

  # Detects and mitigates game-tick modifications
  timer:
    # Enable if you want to prevent players from using "Blink"
    reverse-blink: true
    # Enable if you know what you are doing
    reverse-lag: false

    # Do not kick or ban
    thresholds:
      50: "intave internals sendnotify &c{player}&7/{trust-color}&7 is moving too frequently / is lagging"
      100: "intave internals sendnotify &c{player}&7/{trust-color}&7 is moving too frequently / is lagging for a long period"

  # Detects combat automations such as killaura and aimbot
  heuristics:
    enabled: true

    thresholds:
      # Ban
      on-premise:
        50: "intave internals sendnotify &c{player}&7/{trust-color}&7 is fighting killaura-like"
        100:
          - "intave internals sendnotify &c{player}&7/{trust-color}&7 has been banned for using killaura"
          - $ban$

      # If you do not ban for cloud heuristics, the detection will be deactivated.
      # Deactivation is checked with every ban, activations are issued automatically every midnight CEST.
      # You can expect a false positive rate of one false ban for every 1000 correct bans.
      cloud:
        50: "intave internals sendnotify &c{player}&7/{trust-color}&7 is fighting killaura-like"
        100:
          - "intave internals sendnotify &c{player}&7/{trust-color}&7 has been banned for using killaura"
          - $ban$

  # Detects and blocks reach modifications
  attackraytrace:
    enabled: true

    thresholds:
      # Ban at high VL
      reach:
        50: "intave internals sendnotify &c{player}&7/{trust-color}&7 is attacking from too far away"
        150:
          - "intave internals storelog {player} {check} {vl}"
          - "intave internals sendnotify &c{player}&7/{trust-color}&7 has been banned for using Reach"
          - $ban$

      # Do not ban or kick
      hitbox:
        50: "intave internals sendnotify &c{player}&7/{trust-color}&7 is attacking entities out of sight"
        100: "intave internals sendnotify &c{player}&7/{trust-color}&7 is attacking entities out of sight #2"

      # Do not ban or kick
      timeout:
        50: "intave internals sendnotify &c{player}&7/{trust-color}&7 is attacking past entity positions"
        100: "intave internals sendnotify &c{player}&7/{trust-color}&7 is attacking past entity positions #2"

  # Detects and blocks illegal block interactions
  interactionraytrace:
    enabled: true
    # Do not ban or kick
    thresholds:
      50: "intave internals sendnotify &c{player}&7/{trust-color}&7 is interacting suspiciously"
      100: "intave internals sendnotify &c{player}&7/{trust-color}&7 is interacting suspiciously #2"

  # Detects click automations
  clickpatterns:
    enabled: true
    # Do not ban
    thresholds:
      on-premise:
        50: "intave internals sendnotify &c{player}&7/{trust-color}&7 is clicking suspiciously"
        100:
          - "intave internals storelog {player} {check} {vl}"
          - "intave internals sendnotify &c{player}&7/{trust-color}&7 has been removed for clicking suspiciously"
          - $kick$
      cloud:
        50: "intave internals sendnotify &c{player}&7/{trust-color}&7 is clicking suspiciously"
        100:
          - "intave internals storelog {player} {check} {vl}"
          - "intave internals sendnotify &c{player}&7/{trust-color}&7 has been removed for clicking suspiciously"
          - $kick$

  # Limits the amount of clicks per second
  clickspeedlimiter:
    enabled: true
    max-cps: 20
    thresholds:
      50: "intave internals sendnotify &c{player}&7/{trust-color}&7 is attacking too quickly"
      100:
        - "intave internals sendnotify &c{player}&7/{trust-color}&7 has been removed for attacking too quickly"
        - $kick$

  # Prevents players from breaking blocks too quickly
  breakspeedlimiter:
    enabled: true
    # Ban and kick not necessary
    thresholds:
      100: "intave internals sendnotify &c{player}&7/{trust-color}&7 is breaking blocks too quickly"

  # Various checks for invalid packets
  protocolscanner:
    enabled: true
    check_sent_slot_twice_vl: 100
    thresholds:
      50: "intave internals sendnotify &c{player}&7/{trust-color}&7 is sending invalid packets"
      100:
        - "intave internals sendnotify &c{player}&7/{trust-color}&7 has been banned for sending invalid packets"
        - $ban$

  # Detects placement automations like scaffoldwalk
  placementanalysis:
    enabled: true
    check_timings: false
    thresholds:
      on-premise:
        100: "intave internals sendnotify &c{player}&7/{trust-color}&7 is placing blocks incorrectly"
        200:
          - "intave internals storelog {player} {check} {vl}"
          - "intave internals sendnotify &c{player}&7/{trust-color}&7 has been banned for placing blocks incorrectly"
          - $ban$

      # If you do not ban for cloud placement-analysis, the detection will be deactivated.
      # Deactivation is checked with every ban, activations are issued automatically every midnight CEST.
      cloud:
        100: "intave internals sendnotify &c{player}&7/{trust-color}&7 is using scaffoldwalk"
        200:
          - "intave internals storelog {player} {check} {vl}"
          - "intave internals sendnotify &c{player}&7/{trust-color}&7 has been banned for using scaffoldwalk"
          - $ban$

  # Detects invalid inventory interactions, looks for cheststealer
  inventoryclickanalysis:
    enabled: true
    high-tolerance: true
    # Only ban cloud detections
    thresholds:
      on-premise:
        50: "intave internals sendnotify &c{player}&7/{trust-color}&7 is clicking suspiciously on items"
        100:
          - "intave internals sendnotify &c{player}&7/{trust-color}&7 has been removed for clicking suspiciously on items"
          - $kick$
      # You can change this to a kick, and it will still work.
      cloud:
        50: "intave internals sendnotify &c{player}&7/{trust-color}&7 is performing invalid item-operations"
        100:
          - "intave internals sendnotify &c{player}&7/{trust-color}&7 has been removed for clicking suspiciously on items"
          - $ban$

cloud:
  # Should Intave connect to the cloud?
  enabled: true

  features:
    # Should Intave use the cloud...
    # ...to store session information?
    storage: true
    # ...to resolve trustfactors?
    trustfactor: true
    # ...for additional checks?
    samples: true
    # ...for storing logs?
    logs: true

blacklist:
  apply: true
  message-in-chat: false
  message: "&cYou are on an anti-cheat blacklist and can't join this server"

command:
  hide: true
  reroute:
    "/alerts": "/intave verbose"
    "/cps": "/intave cps"

  # Apply a fix that disables command hide and reroute features,
  # but fixes a 1.12 bug that kicks players when they tab a command
  fix-tab-kicks: false

rejoin:
  # Do not disable this unless you know what you are doing
  delay: 3600
  refresh: true
  message: "&cYou were removed recently, wait before connecting again"

# You should disable any of these options **ONLY**
# when experiencing serious problems and **ONLY** after reporting the issue to us.
# Leaving any of these disabled can result in severely reduced security and stability.
fault-kicks:
  position-faults: true
  missing-position-update: true
  feedback-faults: true
  ignoring-feedback: true
  ignoring-keep-alive: true
  invalid-key-input: true
  invalid-player-action: true
  inventory-faults: true

# Remove some data from packets used to slightly improve cheats
filter:
  health: true

logging:
  # Save logs to a file?
  file-log: true

  # Show trustfactor changes in the console?
  trustfactor: true
  # Show client version on join in the console?
  client-version: true
  # Show command executions in the console?
  command-execution: true
  # Show fault kicks in the console?
  fault-kicks: true
  # Dump player log ids in the console?
  cloud-log-ids: true
  # Verbose mode (ALL, MITIGATED, SELECTED)
  verbose-mode: MITIGATED

  # debugging purposes, do not activate
  #feedback-dump: false

layout:
  verbose: "{prefix} &c{player}&7/{trust-color}&7 {message} {details} (+{vladded} -> {vl})"
  notify: "{prefix} &c&lNotify&8: &7{text}"
  prefix: "&8[&c&lIntave&8]&7 "